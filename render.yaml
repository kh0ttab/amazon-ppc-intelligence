# Render.com deployment config
# Deploy at: https://dashboard.render.com → New Web Service → Connect repo

services:
  - type: web
    name: ppc-intel
    runtime: python
    buildCommand: |
      cd frontend && npm install && npm run build
      pip install -r requirements.txt fastapi uvicorn[standard] sse-starlette python-multipart anthropic apscheduler
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in dashboard
    disk:
      name: ppc-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1   # free tier: requires paid plan for persistent disk
