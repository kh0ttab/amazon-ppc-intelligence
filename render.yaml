# Render.com deployment — FastAPI backend only
# Frontend goes to Vercel. DB goes to Supabase.
# Deploy: dashboard.render.com → New Web Service → connect repo

services:
  - type: web
    name: offprotocol-ppc
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install fastapi "uvicorn[standard]" sse-starlette python-multipart anthropic apscheduler psycopg2-binary requests beautifulsoup4 pandas numpy python-dotenv aiofiles openpyxl nltk
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # paste postgresql://postgres:...@....supabase.co:5432/postgres in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false          # paste sk-ant-... in Render dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
