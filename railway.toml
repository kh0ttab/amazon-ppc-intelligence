# Railway.app deployment config
# Deploy at: https://railway.app → New Project → Deploy from GitHub

[build]
builder = "NIXPACKS"
buildCommand = "cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt fastapi uvicorn[standard] sse-starlette python-multipart anthropic apscheduler"

[deploy]
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "ppc-intel"

[services.variables]
PORT = "8000"
